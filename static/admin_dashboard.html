<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Maintenance Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #F0F4F8;
      color: #1A202C;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 220px; height: 100vh;
      background: #1B3A6B;
      display: flex; flex-direction: column;
      padding: 1.5rem 1rem;
      z-index: 100;
    }
    .sidebar-logo {
      color: #fff;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.25rem;
    }
    .sidebar-sub {
      color: #90B8E8; font-size: 11px;
      margin-bottom: 2rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px;
      color: #B8D0EE; font-size: 13px; font-weight: 500;
      cursor: pointer; margin-bottom: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-icon { font-size: 16px; }

    .sidebar-footer {
      margin-top: auto;
      color: #90B8E8; font-size: 11px;
      padding: 0 4px;
    }

    /* ── Main ── */
    .main {
      margin-left: 220px;
      padding: 1.75rem 2rem;
      min-height: 100vh;
    }

    .page-title {
      font-size: 20px; font-weight: 600; margin-bottom: 0.25rem;
    }
    .page-sub {
      font-size: 13px; color: #718096; margin-bottom: 1.75rem;
    }

    /* ── Stat cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #E2E8F0;
      padding: 1rem 1.25rem;
    }
    .stat-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #718096; margin-bottom: 8px;
    }
    .stat-value {
      font-size: 28px; font-weight: 700; line-height: 1;
    }
    .stat-card.total  .stat-value { color: #1B3A6B; }
    .stat-card.pending .stat-value { color: #D97706; }
    .stat-card.inprog  .stat-value { color: #2563EB; }
    .stat-card.done    .stat-value { color: #059669; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .search-box {
      flex: 1; min-width: 180px;
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #E2E8F0;
      border-radius: 8px; padding: 7px 12px;
    }
    .search-box input {
      border: none; outline: none; font-family: inherit;
      font-size: 13px; color: #1A202C; width: 100%;
      background: transparent;
    }
    .search-box input::placeholder { color: #A0AEC0; }

    .filter-select {
      border: 1px solid #E2E8F0; background: #fff;
      border-radius: 8px; padding: 7px 10px;
      font-family: inherit; font-size: 13px;
      color: #4A5568; outline: none; cursor: pointer;
    }

    .refresh-btn {
      background: #1B3A6B; color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
    }
    .refresh-btn:hover { background: #163060; }

    /* ── Table ── */
    .table-wrap {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #E2E8F0;
      overflow: hidden;
    }
    table {
      width: 100%; border-collapse: collapse;
    }
    thead th {
      background: #F7FAFC;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #718096; padding: 10px 14px;
      text-align: left; border-bottom: 1px solid #E2E8F0;
    }
    tbody tr {
      border-bottom: 1px solid #F0F4F8;
      transition: background 0.1s;
      cursor: pointer;
    }
    tbody tr:hover { background: #F7FAFC; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 14px; font-size: 13px; color: #2D3748; vertical-align: middle; }

    .badge {
      display: inline-block;
      padding: 3px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
    }
    .badge.electrical { background: #FEF3C7; color: #92400E; }
    .badge.plumbing   { background: #DBEAFE; color: #1E40AF; }
    .badge.furniture  { background: #D1FAE5; color: #065F46; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
    }
    .status-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      display: inline-block;
    }
    .status-badge.pending    { background: #FEF3C7; color: #92400E; }
    .status-badge.pending::before    { background: #D97706; }
    .status-badge.in_progress { background: #DBEAFE; color: #1E40AF; }
    .status-badge.in_progress::before { background: #2563EB; }
    .status-badge.resolved   { background: #D1FAE5; color: #065F46; }
    .status-badge.resolved::before   { background: #059669; }

    .empty-row td {
      text-align: center; color: #A0AEC0;
      padding: 2.5rem; font-size: 14px;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      padding: 1.5rem;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: #F0F4F8; border: none;
      border-radius: 50%; width: 30px; height: 30px;
      font-size: 16px; cursor: pointer; color: #4A5568;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-title {
      font-size: 16px; font-weight: 600; margin-bottom: 4px;
    }
    .modal-ref {
      font-size: 12px; color: #718096; margin-bottom: 1.25rem;
    }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 1.25rem;
    }
    .detail-item label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #A0AEC0; display: block; margin-bottom: 3px;
    }
    .detail-item span {
      font-size: 13px; color: #2D3748; font-weight: 500;
    }

    .desc-box {
      background: #F7FAFC; border-radius: 8px;
      padding: 10px 12px; font-size: 13px;
      color: #4A5568; line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .modal-photo {
      width: 100%; border-radius: 10px;
      max-height: 220px; object-fit: cover;
      margin-bottom: 1.25rem; display: none;
    }

    .status-update label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: #718096; display: block; margin-bottom: 8px;
    }
    .status-buttons {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .status-btn {
      flex: 1; min-width: 100px;
      padding: 8px 12px; border-radius: 8px;
      border: 1.5px solid #E2E8F0;
      background: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .status-btn:hover { border-color: #1B3A6B; background: #EBF1FA; color: #1B3A6B; }
    .status-btn.active-status { border-color: #1B3A6B; background: #1B3A6B; color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar { width: 60px; padding: 1rem 0.5rem; }
      .sidebar-logo, .sidebar-sub, .nav-item span, .sidebar-footer { display: none; }
      .nav-item { justify-content: center; padding: 10px; }
      .main { margin-left: 60px; padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      td:nth-child(4), th:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">🏫 HostelCare</div>
  <div class="sidebar-sub">Admin Panel</div>

  <div class="nav-item active">
    <span class="nav-icon">📋</span>
    <span>Complaints</span>
  </div>

  <!-- Future features -->
 !---- <div class="nav-item" onclick="alert('QR generator coming next!')">
    <span class="nav-icon">🔳</span>
    <span>QR Codes</span>
  </div>
  <div class="sidebar-footer">HostelCare v1.0</div>
</aside>

<!-- Main content -->
<main class="main">
  <div class="page-title">Maintenance Complaints</div>
  <div class="page-sub" id="last-updated">Loading…</div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card total">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">–</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="stat-pending">–</div>
    </div>
    <div class="stat-card inprog">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" id="stat-inprog">–</div>
    </div>
    <div class="stat-card done">
      <div class="stat-label">Resolved</div>
      <div class="stat-value" id="stat-resolved">–</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-box">
      🔍 <input type="text" id="search-input" placeholder="Search by student, hostel, ref…" oninput="filterTable()" />
    </div>
    <select class="filter-select" id="filter-status" onchange="filterTable()">
      <option value="">All statuses</option>
      <option value="pending">Pending</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
    </select>
    <select class="filter-select" id="filter-cat" onchange="filterTable()">
      <option value="">All categories</option>
      <option value="electrical">Electrical</option>
      <option value="plumbing">Plumbing</option>
      <option value="furniture">Furniture</option>
    </select>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ref</th>
          <th>Student</th>
          <th>Hostel / Room</th>
          <th>Category</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="complaints-tbody">
        <tr class="empty-row"><td colspan="6">Loading complaints…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-title" id="modal-title">Complaint Details</div>
    <div class="modal-ref"  id="modal-ref"></div>

    <div class="detail-grid">
      <div class="detail-item"><label>Student</label><span id="m-student"></span></div>
      <div class="detail-item"><label>Hostel</label><span id="m-hostel"></span></div>
      <div class="detail-item"><label>Room</label><span id="m-room"></span></div>
      <div class="detail-item"><label>Category</label><span id="m-cat"></span></div>
      <div class="detail-item"><label>Submitted</label><span id="m-date"></span></div>
      <div class="detail-item"><label>Last updated</label><span id="m-updated"></span></div>
    </div>

    <div class="desc-box" id="m-desc"></div>

    <img class="modal-photo" id="m-photo" src="" alt="Complaint photo" />

    <div class="status-update">
      <label>Update status</label>
      <div class="status-buttons">
        <button class="status-btn" data-val="pending"     onclick="updateStatus(this)">🟡 Pending</button>
        <button class="status-btn" data-val="in_progress" onclick="updateStatus(this)">🔵 In Progress</button>
        <button class="status-btn" data-val="resolved"    onclick="updateStatus(this)">🟢 Resolved</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = '';          // Set to '' if Flask serves this file, or 'http://localhost:5000'
  let allComplaints = [];
  let currentRef   = null;

  // ── Load stats + complaints ──────────────────────────────────────────────────

  async function loadData() {
    try {
      const [statsRes, listRes] = await Promise.all([
        fetch(`${API}/api/admin/stats`),
        fetch(`${API}/api/admin/complaints`)
      ]);
      const stats = await statsRes.json();
      const list  = await listRes.json();

      // Stats
      document.getElementById('stat-total').textContent    = stats.total;
      document.getElementById('stat-pending').textContent  = stats.pending;
      document.getElementById('stat-inprog').textContent   = stats.in_progress;
      document.getElementById('stat-resolved').textContent = stats.resolved;

      allComplaints = list;
      renderTable(list);

      document.getElementById('last-updated').textContent =
        'Last refreshed: ' + new Date().toLocaleTimeString();

    } catch (err) {
      document.getElementById('last-updated').textContent = '⚠ Could not reach server.';
      renderTable([]);
    }
  }

  // ── Render table ─────────────────────────────────────────────────────────────

  function renderTable(rows) {
    const tbody = document.getElementById('complaints-tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No complaints found.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(c => `
      <tr onclick="openModal('${c.ref_number}')">
        <td><strong>${c.ref_number}</strong></td>
        <td>${esc(c.student)}</td>
        <td>${esc(c.hostel)}${c.room ? ' / ' + esc(c.room) : ''}</td>
        <td><span class="badge ${c.category}">${cap(c.category)}</span></td>
        <td><span class="status-badge ${c.status}">${fmtStatus(c.status)}</span></td>
        <td>${fmtDate(c.created_at)}</td>
      </tr>
    `).join('');
  }

  // ── Filter ───────────────────────────────────────────────────────────────────

  function filterTable() {
    const q   = document.getElementById('search-input').value.toLowerCase();
    const st  = document.getElementById('filter-status').value;
    const cat = document.getElementById('filter-cat').value;

    const filtered = allComplaints.filter(c => {
      const matchQ   = !q || [c.ref_number, c.student, c.hostel, c.room].join(' ').toLowerCase().includes(q);
      const matchSt  = !st  || c.status   === st;
      const matchCat = !cat || c.category === cat;
      return matchQ && matchSt && matchCat;
    });
    renderTable(filtered);
  }

  // ── Modal ────────────────────────────────────────────────────────────────────

  async function openModal(ref) {
    currentRef = ref;
    try {
      const res = await fetch(`${API}/api/admin/complaints/${ref}`);
      const c   = await res.json();

      document.getElementById('modal-title').textContent  = cap(c.category) + ' Complaint';
      document.getElementById('modal-ref').textContent    = 'Ref: ' + c.ref_number;
      document.getElementById('m-student').textContent    = c.student;
      document.getElementById('m-hostel').textContent     = c.hostel;
      document.getElementById('m-room').textContent       = c.room || '—';
      document.getElementById('m-cat').textContent        = cap(c.category);
      document.getElementById('m-date').textContent       = fmtDate(c.created_at);
      document.getElementById('m-updated').textContent    = fmtDate(c.updated_at);
      document.getElementById('m-desc').textContent       = c.description;

      const photo = document.getElementById('m-photo');
      if (c.photo_path) {
        photo.src   = `${API}/uploads/${c.photo_path}`;
        photo.style.display = 'block';
      } else {
        photo.style.display = 'none';
      }

      // Highlight current status button
      document.querySelectorAll('.status-btn').forEach(b => {
        b.classList.toggle('active-status', b.dataset.val === c.status);
      });

      document.getElementById('modal-overlay').classList.add('open');
    } catch (err) {
      alert('Could not load complaint details.');
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modal-overlay').classList.remove('open');
    currentRef = null;
  }

  // ── Update status ─────────────────────────────────────────────────────────────

  async function updateStatus(btn) {
    if (!currentRef) return;
    const newStatus = btn.dataset.val;
    try {
      await fetch(`${API}/api/admin/complaints/${currentRef}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      document.querySelectorAll('.status-btn').forEach(b =>
        b.classList.toggle('active-status', b.dataset.val === newStatus)
      );
      // Update the in-memory list too
      const c = allComplaints.find(x => x.ref_number === currentRef);
      if (c) c.status = newStatus;
      filterTable();
      loadData(); // refresh stats
    } catch (err) {
      alert('Could not update status.');
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function esc(s) {
    return (s || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function cap(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
  }
  function fmtStatus(s) {
    return { pending: 'Pending', in_progress: 'In Progress', resolved: 'Resolved' }[s] || s;
  }
  function fmtDate(s) {
    if (!s) return '—';
    return new Date(s + 'Z').toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────

  loadData();
  setInterval(loadData, 30000); // auto-refresh every 30 seconds
</script>

</body>
</html>
